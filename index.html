<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>du du</title>
</head>

</audio>
<body style="background-color: pink;">
    <div id="content" style="justify-content: center;width: 100%;text-align: center;">
        
    </div>
    <script>
        (() => {
            const intervalMs = 25;
            const fontStepPx = 2;
            const verticalCountMax = 25;
            const duduFontSize = 75;
            const text = "DUDU";


            let count = 0;
            const startTime = Date.now();

            const contentDiv = document.getElementById("content")

            printVertical()

            function printVertical() {
                let verticalCount = 0

                contentDiv.innerHTML = "";
                intervalId = setInterval(() => {
                    contentDiv.innerHTML += `<div style="font-size: ${duduFontSize}px;">${text}</div>`;
                    verticalCount++;
                    if(verticalCount > verticalCountMax) {
                        clearInterval(intervalId);
                        printVerticalInverted();
                        return;
                    }
                }, intervalMs)
            }

            function printVerticalInverted() {
                let verticalCount = verticalCountMax

                intervalId = setInterval(() => {
                    contentDiv.removeChild(contentDiv.lastChild);
                    verticalCount--;
                    if(verticalCount <= 0) {
                        clearInterval(intervalId);
                        printVertical();
                        return;
                    }
                }, intervalMs)
            }
        })();

    </script>
</body>
</html>
